# Web/backend tier — Reflex Python backend. App name/region are also set by
# deploy.sh; keep these in sync if you change the PREFIX/REGION there.
app = "audiomedia-backend"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  # Stateless machines: media lives in object storage, state in Redis. The
  # whisper model cache is ephemeral (re-downloaded on a cold machine; bake it
  # into the image later if cold-start latency matters).
  HF_HOME = "/tmp/hf-cache"
  # URLs / CORS so the separate frontend can reach the backend + its media.
  # These fly.dev values are the FALLBACK for a bare `fly deploy`. deploy.sh
  # overrides them via --env when FRONTEND_DOMAIN/BACKEND_DOMAIN are set
  # (custom domains + multi-origin CORS).
  REFLEX_API_URL = "https://audiomedia-backend.fly.dev"
  REFLEX_DEPLOY_URL = "https://audiomedia-frontend.fly.dev"
  REFLEX_CORS_ALLOWED_ORIGINS = "https://audiomedia-frontend.fly.dev"
  # App-specific (Google OAuth) config
  BACKEND_URL = "https://audiomedia-backend.fly.dev"
  FRONTEND_URL = "https://audiomedia-frontend.fly.dev"
  GOOGLE_REDIRECT_URI = "https://audiomedia-backend.fly.dev/auth/google/callback"

# Secrets set via `fly secrets set` (see deploy.sh): ANTHROPIC_API_KEY,
# PEXELS_API_KEY, PIXABAY_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
# DATABASE_URL (via `fly postgres attach`), AWS_*/BUCKET_NAME/AWS_ENDPOINT_URL_S3
# (via `fly storage create` — Tigris), and REDIS_URL (via `fly redis create`).

[http_service]
  internal_port = 8000
  force_https = true
  # Stateless backend (Redis state + object storage) → safe to run multiple
  # machines / scale to zero. Bump min_machines_running for warm capacity.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  # 4GB gives headroom for the video-compose step (whisper is freed first; the
  # renderer is now per-segment, so peak is well under this).
  memory = "4gb"
