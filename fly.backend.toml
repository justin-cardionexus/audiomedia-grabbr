# Web/backend tier — Reflex Python backend. App name/region are also set by
# deploy.sh; keep these in sync if you change the PREFIX/REGION there.
app = "audiomedia-backend"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  # Persistent storage (Fly volume mounted at /data)
  REFLEX_UPLOADED_FILES_DIR = "/data/uploaded_files"
  HF_HOME = "/data/hf-cache"
  # URLs / CORS so the separate frontend can reach the backend + its media
  REFLEX_API_URL = "https://audiomedia-backend.fly.dev"
  REFLEX_DEPLOY_URL = "https://audiomedia-frontend.fly.dev"
  REFLEX_CORS_ALLOWED_ORIGINS = "https://audiomedia-frontend.fly.dev"
  # App-specific (Google OAuth) config
  BACKEND_URL = "https://audiomedia-backend.fly.dev"
  FRONTEND_URL = "https://audiomedia-frontend.fly.dev"
  GOOGLE_REDIRECT_URI = "https://audiomedia-backend.fly.dev/auth/google/callback"

# Secrets set via `fly secrets set` (see deploy.sh): ANTHROPIC_API_KEY,
# PEXELS_API_KEY, PIXABAY_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
# and DATABASE_URL (injected by `fly mpg attach`).

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine always up: Reflex state is in-memory, the pipeline runs
  # in-process, and the volume is single-attach.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "audiomedia_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
