# Local backing services for multi-instance parity: object storage (MinIO,
# S3-compatible) + Redis (shared Reflex state). The app itself runs on the host
# (`reflex run`); these just provide the services it connects to.
#
#   docker compose up -d
#   # then in .env:  (see .env.example "Object storage" + "Redis" sections)
#   #   AWS_ENDPOINT_URL_S3=http://localhost:9000
#   #   BUCKET_NAME=audiomedia
#   #   AWS_ACCESS_KEY_ID=minioadmin
#   #   AWS_SECRET_ACCESS_KEY=minioadmin
#   #   AWS_REGION=auto
#   #   REDIS_URL=redis://localhost:6379
#
# MinIO console: http://localhost:9001 (minioadmin / minioadmin)

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the bucket once MinIO is up.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/audiomedia &&
      echo 'bucket audiomedia ready'
      "

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

volumes:
  minio_data:
