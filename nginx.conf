server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets — safe to cache aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: serve index.html for client-side routes
    # (e.g. /project/<id>, /login, /auth/complete/<token>).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
